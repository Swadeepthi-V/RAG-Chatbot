name: Daily Ingestion & Index Update

on:
  schedule:
    # Runs at 10:00 AM IST (which is 04:30 AM UTC) every day
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Pipeline
        run: |
          python src/app/run_pipeline.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and Push database index changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Force add files since the data/ directory is in .gitignore
          git add -f data/vector_store.index data/vector_store.meta data/chroma_db/
          git commit -m "chore: auto-update daily mutual fund vector index" || echo "No changes to commit"
          git push "https://x-access-token:${{ secrets.MY_GH_PAT }}@github.com/Swadeepthi-V/RAG-Chatbot.git" HEAD:main
